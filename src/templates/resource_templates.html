{% extends 'base.html' %}

{% block title %}Resource Templates - Sinopia Blue Core{% endblock %}

{% block head %}
<meta name="bf-interop-version" content="{{ bf_interop_version }}">
<script type="py" config='{"packages": ["/static/wheels/rdflib-7.6.0-py3-none-any.whl", "/static/wheels/dctap2shacl-0.2.0-py3-none-any.whl", "pandas"], "files": {"/sinopia/dctap-shacl.py": "./dctap_shacl.py"}}'>
import dctap_shacl
import js
from pyscript import when


def _modal(modal_id: str) -> object:
    return js.bootstrap.Modal.getOrCreateInstance(js.document.getElementById(modal_id))


def _mark_loaded_rows():
    """Highlight rows whose SHACL is already stored in the localStorage template list."""
    rows = js.document.querySelectorAll(".rt-table tbody tr")
    for i in range(rows.length):
        row = rows.item(i)
        btn = row.querySelector("[data-filename]")
        if not btn:
            continue
        filename = btn.getAttribute("data-filename")
        source = btn.getAttribute("data-source")
        if dctap_shacl.is_in_template_graph(source, filename):
            row.classList.add("table-success")
        else:
            row.classList.remove("table-success")


_mark_loaded_rows()


@when("click", ".btn-dctap-shacl")
async def on_convert(event):
    el = event.target.closest("[data-filename]")
    if not el:
        return
    filename = el.getAttribute("data-filename")
    source = el.getAttribute("data-source")

    js.document.getElementById("shacl-modal-label").textContent = filename
    js.document.getElementById("shacl-output").textContent = "Loading…"
    _modal("shacl-modal").show()

    try:
        shacl = await dctap_shacl.get_shacl(source, filename)
        js.document.getElementById("shacl-output").textContent = shacl
        js.document.getElementById("shacl-add-status").textContent = ""
    except Exception as exc:
        js.document.getElementById("shacl-output").textContent = f"Error: {exc}"


@when("click", "#btn-add-to-graph")
def on_add_to_graph(event):
    shacl = js.document.getElementById("shacl-output").textContent
    if not shacl or shacl == "Loading…":
        return
    count = dctap_shacl.add_to_template_graph(shacl)
    status = js.document.getElementById("shacl-add-status")
    status.textContent = f"Saved — {count} item{'s' if count != 1 else ''} in graph"
    _mark_loaded_rows()


@when("click", ".btn-view-template")
async def on_view(event):
    el = event.target.closest("[data-filename]")
    if not el:
        return
    filename = el.getAttribute("data-filename")
    source = el.getAttribute("data-source")

    js.document.getElementById("view-modal-label").textContent = filename
    js.document.getElementById("view-output").innerHTML = "<p class='text-muted'>Loading…</p>"
    _modal("view-modal").show()

    try:
        html = await dctap_shacl.view_as_html(source, filename)
        js.document.getElementById("view-output").innerHTML = html
    except Exception as exc:
        js.document.getElementById("view-output").innerHTML = f"<p class='text-danger'>Error: {exc}</p>"
</script>
{% endblock %}

{% block content %}
{% include '_resource_templates.html' %}
{% endblock %}
