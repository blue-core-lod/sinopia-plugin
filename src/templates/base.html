<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sinopia - Blue Core{% endblock %}</title>

  {% block head_meta %}{% endblock %}

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <script type="module"
    src="https://pyscript.net/releases/2024.11.1/core.js"></script>
  <link rel="stylesheet"
    href="https://pyscript.net/releases/2024.11.1/core.css">

  <link rel="stylesheet" href="{{ url_for('static', path='default.css') }}">

  {% block head %}{% endblock %}
</head>
<body>

{% include '_header.html' %}
{% include '_subnav.html' %}

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
