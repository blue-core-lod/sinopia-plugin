<!-- ═══════════════════ DASHBOARD ═══════════════════ -->
<div class="container-fluid px-4 pt-4">

  <!-- Recent searches -->
  <h4 class="mb-3">Recent searches</h4>
  <table class="table table-bordered mb-5" style="font-size:.9rem;">
    <thead>
      <tr>
        <th style="width:30%">Authority</th>
        <th>Query</th>
        <th style="width:60px;"></th>
      </tr>
    </thead>
    <tbody>
      {% if recent_searches %}
        {% for search in recent_searches %}
        <tr>
          <td>{{ search.authority }}</td>
          <td>{{ search.query }}</td>
          <td class="text-center">
            <a href="#" class="text-primary"><i class="bi bi-search fs-5"></i></a>
          </td>
        </tr>
        {% endfor %}
      {% else %}
        <tr>
          <td colspan="3" class="text-muted text-center py-3">No recent searches.</td>
        </tr>
      {% endif %}
    </tbody>
  </table>
</div>
